    healthcheck:
      test: [ "CMD", "curl --fail --silent service-offering:5004/actuator/health/readiness | grep UP }} exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    container_name: service-offering
    depends_on:
      servicesdb:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "service-offering"
      SPRING_DATASOURCE_URL: "jdbc:mysql://servicesdb:3306/servicesdb"
      SPRING_DATASOURCE_USERNAME: "root"
      SPRING_DATASOURCE_PASSWORD: "root"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eurekaserver:8070/eureka/
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - kamana04

  gatewayserver:
    image: "kamana04/salon-gateway-server:v1"
    ports:
      - "5000:5000"
    healthcheck:
      test: [ "CMD", "curl --fail --silent gatewayserver:5000/actuator/health/readiness | grep UP }} exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    container_name: gatewayserver
    environment:
      SPRING_APPLICATION_NAME: "gateway-server"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eurekaserver:8070/eureka/
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - kamana04

networks:
  kamana04:
    driver: "bridge"